apiVersion: apps/v1
kind: Deployment
metadata:
  name: netsapiens-mcp
  namespace: netsapiens-mcp
  labels:
    app: netsapiens-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netsapiens-mcp
  template:
    metadata:
      labels:
        app: netsapiens-mcp
    spec:
      containers:
        - name: netsapiens-mcp
          image: netsapiens-mcp:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: netsapiens-mcp
            - secretRef:
                name: netsapiens-mcp
          volumeMounts:
            - name: token-data
              mountPath: /home/nodejs/.netsapiens-mcp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
      volumes:
        - name: token-data
          persistentVolumeClaim:
            claimName: netsapiens-mcp-tokens
